app = "rag-rbac-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  EMBEDDING_PROVIDER = "openai"
  EMBEDDING_MODEL = "text-embedding-3-small"
  CHROMA_PERSIST_DIR = "/app/data/chroma_db"
  METRICS_DB_PATH = "/app/data/metrics.db"
  API_PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

[checks]
  [checks.alive]
    grace_period = "15m"
    interval = "30s"
    method = "GET"
    path = "/health"
    port = 8000
    timeout = "10s"
    type = "http"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "rag_data"
  destination = "/app/data"
  initial_size = "3gb"

name: CD

on:
  push:
    branches: [master]

jobs:
  deploy-api:
    name: Deploy API to Fly.io
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy API
        run: flyctl deploy --config fly.toml --remote-only --wait-timeout 1200
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-ui:
    name: Deploy UI to Fly.io
    runs-on: ubuntu-latest
    needs: deploy-api

    steps:
      - uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Streamlit UI
        run: flyctl deploy --config fly.ui.toml --remote-only --wait-timeout 120
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_UI_API_TOKEN }}
